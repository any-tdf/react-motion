<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>React Motion</title>
		<script>
			const storedTheme = localStorage.getItem('react-motion-theme');
			const themeMode = storedTheme === 'light' || storedTheme === 'dark' || storedTheme === 'auto' ? storedTheme : 'auto';
			const resolvedTheme = themeMode === 'dark' || (themeMode === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
			document.documentElement.dataset.theme = resolvedTheme;
			document.documentElement.dataset.themeMode = themeMode;
			document.documentElement.style.colorScheme = resolvedTheme;
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
